<div class="admin-page">
  <div class="page-header">
    <h1>Seguros de Alquiler</h1>
    <button class="btn-primary">+ Nuevo Seguro</button>
  </div>

  <div class="table-container">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Costo Diario</th>
          <th>Descripción</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (s of seguros(); track s.SEG_id) {
        <tr>
          <td><strong class="text-cyan">{{ s.SEG_nombre }}</strong></td>
          <td>${{ s.SEG_costo }}</td>
          <td>{{ s.SEG_descripcion }}</td>
          <td><button class="btn-icon">✏️</button></td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
