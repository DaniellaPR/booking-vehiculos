<div class="admin-page">
  <div class="page-header">
    <h1>Categorías de Vehículos</h1>
    <button class="btn-add">+ Nueva Categoría</button>
  </div>

  <div class="table-container">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Categoría</th>
          <th>Costo Base</th>
          <th>Descripción</th>
        </tr>
      </thead>
      <tbody>
        @for (c of categorias(); track c.CAT_id) {
        <tr>
          <td><strong>{{ c.CAT_nombre }}</strong></td>
          <td>${{ c.CAT_costoBase }} / día</td>
          <td>{{ c.CAT_descripcion }}</td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
