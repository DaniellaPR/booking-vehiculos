<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">Drive<span>X</span> Admin</div>
    </div>

    <nav class="sidebar-menu">
      <a routerLink="/admin/dashboard" routerLinkActive="active"><span>📊</span> Dashboard</a>
      <a routerLink="/admin/vehiculos" routerLinkActive="active"><span>🚗</span> Gestión de Flota</a>
      <a routerLink="/admin/reservas" routerLinkActive="active"><span>📅</span> Reservas</a>
      <div class="menu-divider">Mantenimiento</div>
      <a routerLink="/admin/sucursales" routerLinkActive="active"><span>🏢</span> Sucursales</a>
    </nav>

    <button class="btn-logout" (click)="logout()">Cerrar Sesión</button>
  </aside>

  <main class="content-area">
    <header class="topbar">
      <div class="breadcrumb">Panel / {{ authService.getRoles()[0] }}</div>
      <div class="user-pill">
        <span class="status-indicator"></span>
        {{ authService.getName() }}
      </div>
    </header>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
