<!-- app/app/marketplace/busqueda/busqueda.html -->
<app-navbar></app-navbar>

<main class="search-container">
  <aside class="filters">
    <h3>Filtros</h3>
    <div class="filter-group">
      <label>Categoría</label>
      <select (change)="onCategoriaChange($event)">
        <option value="">Todas las categorías</option>
        @for (cat of categorias(); track cat.caT_id || cat.CAT_id) {
        <option [value]="cat.caT_id || cat.CAT_id">
          {{ cat.caT_nombre || cat.CAT_nombre }}
        </option>
        }
      </select>
    </div>
  </aside>

  <section class="results">
    <h2>Vehículos Disponibles</h2>

    @if (vehiculos().length === 0) {
    <div class="loader">Cargando vehículos...</div>
    } @else {
    <div class="grid-results">
      @for (v of vehiculosFiltrados(); track v.veH_id || v.VEH_id) {
      <app-card-vehiculo [vehiculo]="v"
                         [precioBase]="getPrecioVehiculo(v)">
      </app-card-vehiculo>
      } @empty {
      <div style="padding: 20px; color: var(--text2);">
        No hay vehículos para esta categoría.
      </div>
      }
    </div>
    }
  </section>
</main>

<app-footer></app-footer>
