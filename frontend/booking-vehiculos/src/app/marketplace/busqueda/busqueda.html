<app-navbar></app-navbar>

<main class="search-container">
  <aside class="filters">
    <h3>Filtros</h3>
    <div class="filter-group">
      <label>Categoría</label>
      <select>
        <option value="">Todas</option>
        @for (cat of categorias(); track cat.CAT_id) {
        <option [value]="cat.CAT_id">{{ cat.CAT_nombre }}</option>
        }
      </select>
    </div>
  </aside>

  <section class="results">
    <h2>Vehículos Disponibles</h2>
    @if (vehiculos().length === 0) {
    <div class="loader">Cargando vehículos...</div>
    } @else {
    <div class="grid-results">
      @for (v of vehiculos(); track v.VEH_id) {
      <div class="card-v">
        <div class="card-img">🚗</div>
        <div class="card-body">
          <h4>{{ v.VEH_modelo }}</h4>
          <p>Año: {{ v.VEH_anio }}</p>
          <button class="btn btn-primary" (click)="verDetalle(v.VEH_id)">Ver Detalles</button>
        </div>
      </div>
      }
    </div>
    }
  </section>
</main>

<app-footer></app-footer>
